// ── DB layer (Firebase + localStorage fallback) ───────────────────────────────
const DB={
  async get(k){
    // try Firebase first
    if(_fbOk){
      try{
        const snap=await get(ref(_db,'followup/'+k.replace(/:/g,'_')));
        if(snap.exists())return snap.val();
      }catch(e){console.warn('FB get error',e);}
    }
    // fallback: localStorage
    try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}
  },
  async set(k,v){
    // localStorage always (offline backup)
    try{localStorage.setItem(k,JSON.stringify(v));}catch{}
    // Firebase
    if(_fbOk){
      try{await set(ref(_db,'followup/'+k.replace(/:/g,'_')),v);}
      catch(e){console.warn('FB set error',e);}
    }
  },
  // real-time listener
  listen(k,cb){
    if(!_fbOk)return ()=>{};
    const r=ref(_db,'followup/'+k.replace(/:/g,'_'));
    onValue(r,snap=>{if(snap.exists())cb(snap.val());});
    return ()=>off(r);
  },
  isOnline:()=>_fbOk,
};

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,color='#e6edf3'){
  let el=document.querySelector('.toast');
  if(!el){el=document.createElement('div');el.className='toast';document.body.appendChild(el);}
  el.textContent=msg;el.style.color=color;el.style.opacity='1';
  clearTimeout(_tt);_tt=setTimeout(()=>{el.style.opacity='0';},2200);
}

// ── Install Banner ────────────────────────────────────────────────────────────
function InstallBanner({t,dp,setDp}){
  const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!/crios/i.test(navigator.userAgent);
  const [show,setShow]=useState(true);
  if(!show||window.matchMedia('(display-mode: standalone)').matches)return null;
  if(!dp&&!isIos)return null;
  const install=async()=>{if(dp){dp.prompt();const{outcome}=await dp.userChoice;if(outcome==='accepted')setDp(null);}setShow(false);};
  return h('div',{className:'ibanner',dir:t.dir},
    h('span',{style:{fontSize:26,flexShrink:0}},'📲'),
    h('div',{style:{flex:1}},
      h('div',{style:{color:'#e6edf3',fontWeight:700,fontSize:14,marginBottom:3}},t.installTitle),
      h('div',{style:{color:'#8b949e',fontSize:12}},isIos?t.installIos:t.installMsg)
    ),
    !isIos&&h('button',{className:'btn btn-primary',style:{padding:'7px 13px',fontSize:13},onClick:install},t.installBtn),
    h('button',{onClick:()=>setShow(false),style:{background:'none',border:'none',color:'#8b949e',fontSize:18,cursor:'pointer'}},'\xd7')
  );
}

    if(Array.isArray(u.systemIds))return u.systemIds;

    return[];

    const cur=form.systemIds||[];

    setForm({name:acc.name,password:acc.password,role:acc.role,systemIds:getSysIds(acc)});
    setErr('');setView(acc);
  };
  const openNew=()=>{setForm(blank);setErr('');setView('new');};

    if(!form.password.trim()){setErr(t.passEmpty);return;}

// ── Export ────────────────────────────────────────────────────────────────────
function exXlsx(rows,systems,t){
  import('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js').then(()=>{
    const X=window.XLSX,hh=t.pdfHeaders;
    const data=rows.map(p=>{const s=systems.find(x=>x.id===p.systemId);
      return{[hh[0]]:t.dir==='rtl'?s?.nameAr:s?.nameEn,[hh[1]]:p.partNumber,[hh[2]]:p.partName||'',[hh[3]]:p.niin||'',[hh[4]]:p.condition,
        [hh[5]]:p.serial,[hh[6]]:p.type,[hh[7]]:p.location,[hh[8]]:p.status,[hh[9]]:p.editor,[hh[10]]:p.date};});
    const ws=X.utils.json_to_sheet(data);ws['!cols']=[16,18,22,16,18,16,16,14,32,12,14].map(w=>({wch:w}));
    const wb=X.utils.book_new();X.utils.book_append_sheet(wb,ws,'FOLLOWUP');X.writeFile(wb,`FOLLOWUP_${today()}.xlsx`);
  });
}
function exPdf(rows,systems,t){
  const w=window.open('','_blank');
  const trs=rows.map(p=>{const s=systems.find(x=>x.id===p.systemId);
    return`<tr><td>${t.dir==='rtl'?s?.nameAr||'':s?.nameEn||''}</td><td>${p.partNumber}</td>
    <td>${p.partName||'—'}</td><td>${p.niin||'—'}</td><td>${p.condition}</td><td>${p.serial}</td><td>${p.type}</td><td>${p.location}</td>
    <td>${p.status}</td><td>${p.editor}</td><td>${p.date}</td></tr>`;}).join('');
  const ths=t.pdfHeaders.map(x=>`<th>${x}</th>`).join('');
  w.document.write(`<!DOCTYPE html><html dir="${t.dir}"><head><meta charset="UTF-8"/><title>FOLLOWUP</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;direction:${t.dir};padding:20px}
  h2{text-align:center;margin-bottom:4px}p.s{text-align:center;color:#666;margin:0 0 14px}
  table{width:100%;border-collapse:collapse}th{background:#1a1a2e;color:#fff;padding:6px 5px;font-size:10px}
  td{padding:5px;border-bottom:1px solid #ddd;font-size:10px}tr:nth-child(even) td{background:#f5f5f5}
  @media print{button{display:none}}</style></head><body>
  <h2>📋 ${t.pdfTitle}</h2><p class="s">${t.pdfDate(new Date().toLocaleDateString(),rows.length)}</p>
  <table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table><br/>
  <button onclick="window.print()" style="padding:8px 20px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;cursor:pointer">${t.pdfFooter}</button>

}

// ── Part Form ─────────────────────────────────────────────────────────────────
function PartForm({init,onSave,onCancel,color,user,t}){
  const [f,setF]=useState(init||{partNumber:'',partName:'',condition:t.conditions[0],serial:'',niin:'',
    type:PART_TYPES[0],location:t.locations[0],status:t.statuses[0],editor:user.name,date:today()});
  const s=(k,v)=>setF(x=>({...x,[k]:v,date:today(),editor:user.name}));
  const [scanning,setScanning]=useState(false);
  const [scanMsg,setScanMsg]=useState('');

  const handleScan=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setScanning(true);
    setScanMsg(t.dir==='rtl'?'🔍 جاري تحليل الصورة...':'🔍 Analyzing image...');
    try{
      // Convert image to base64
      const b64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      // Call Claude Vision API
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
            {type:'text',text:`Look at this military/technical label, tag, or nameplate image. Extract ONLY these three values if visible:

1. Part Number (labeled as: P/N, PN, Part No, Part Number, PART NO)
2. Serial Number (labeled as: S/N, SN, Serial No, Serial Number, SER NO)
3. NIIN (National Item Identification Number):
   - If you see an NSN (National Stock Number) in format XXXX-XX-XXX-XXXX (13 digits), the NIIN is the LAST 9 digits — i.e. remove the first 4-digit FSC code. Example: NSN "1560-01-234-5678" → NIIN "01-234-5678" or "012345678".
   - If you see a value already labeled NIIN, use it directly.
   - Keep the format with or without dashes as shown on the label.

Return ONLY a valid JSON object with exactly these keys: {"partNumber":"","serial":"","niin":""}
If a value is not found, leave it as empty string. No explanation, no markdown fences, just the raw JSON.`}
          ]}]
        })
      });
      const data=await resp.json();
      const txt=data.content?.find(x=>x.type==='text')?.text||'{}';
      const clean=txt.replace(/```json|```/g,'').trim();
      const result=JSON.parse(clean);
      // Auto-fill found values
      setF(x=>({
        ...x,
        partNumber:result.partNumber||x.partNumber,
        serial:result.serial||x.serial,
        niin:result.niin||x.niin,
        date:today(),editor:user.name
      }));
      const found=[result.partNumber&&'Part No',result.serial&&'Serial',result.niin&&'NIIN'].filter(Boolean);
      setScanMsg(found.length>0
        ?(t.dir==='rtl'?`✅ تم استخراج: ${found.join(', ')}`:`✅ Extracted: ${found.join(', ')}`)
        :(t.dir==='rtl'?'⚠️ لم يتم التعرف على أي بيانات':'⚠️ No data recognized'));
    }catch(err){
      setScanMsg(t.dir==='rtl'?'❌ فشل التحليل، حاول مجدداً':'❌ Analysis failed, try again');
    }
    setScanning(false);
    e.target.value='';
  };

  return h('div',null,
    // ── Scan button
    h('div',{style:{marginBottom:14}},
      h('label',{style:{display:'block'}},
        h('div',{style:{
          display:'flex',alignItems:'center',justifyContent:'center',gap:10,
          background:'linear-gradient(135deg,#1a3a1a,#0d2d0d)',
          border:'2px dashed #25D36666',borderRadius:12,padding:'14px',
          cursor:scanning?'not-allowed':'pointer',opacity:scanning?0.7:1
        }},
          h('span',{style:{fontSize:26}},scanning?'⏳':'📷'),
          h('div',null,
            h('div',{style:{color:'#25D366',fontWeight:800,fontSize:14}},
              t.dir==='rtl'?'مسح ملصق القطعة بالكاميرا':'Scan Part Label with Camera'),
            h('div',{style:{color:'#8b949e',fontSize:12,marginTop:2}},
              t.dir==='rtl'?'يستخرج تلقائياً: Part Number, Serial, NIIN':'Auto-extracts: Part Number, Serial, NIIN')
          )
        ),
        h('input',{type:'file',accept:'image/*',capture:'environment',
          style:{display:'none'},onChange:handleScan,disabled:scanning})
      ),
      scanMsg&&h('div',{style:{
        marginTop:8,padding:'8px 12px',borderRadius:8,fontSize:13,
        background:scanMsg.includes('✅')?'#3fb95022':scanMsg.includes('⚠️')?'#f7971e22':'#f8514922',
        color:scanMsg.includes('✅')?'#3fb950':scanMsg.includes('⚠️')?'#f7971e':'#f85149',
        border:`1px solid ${scanMsg.includes('✅')?'#3fb95044':scanMsg.includes('⚠️')?'#f7971e44':'#f8514944'}`
      }},scanMsg)
    ),
    h('div',{className:'g2',style:{gap:'0 14px'}},
      h(Fld,{label:t.partNumber},h('input',{className:'inp',value:f.partNumber,onChange:e=>s('partNumber',e.target.value),placeholder:t.partNumPH})),
      h(Fld,{label:t.partName},h('input',{className:'inp',value:f.partName||'',onChange:e=>s('partName',e.target.value),placeholder:t.dir==='rtl'?'مثال: مضخة هيدروليكية':'e.g. Hydraulic Pump'})),
      h(Fld,{label:'NIIN'},h('input',{className:'inp',value:f.niin||'',onChange:e=>s('niin',e.target.value),placeholder:'XX-XXX-XXXX'})),
      h(Fld,{label:t.condition},h('select',{className:'inp',value:f.condition,onChange:e=>s('condition',e.target.value)},t.conditions.map(c=>h('option',{key:c},c)))),
      h(Fld,{label:t.serial},h('input',{className:'inp',value:f.serial,onChange:e=>s('serial',e.target.value),placeholder:t.serialPH})),
      h(Fld,{label:t.partType},h('select',{className:'inp',value:f.type,onChange:e=>s('type',e.target.value)},PART_TYPES.map(x=>h('option',{key:x},x)))),
      h(Fld,{label:t.location},h('select',{className:'inp',value:f.location,onChange:e=>s('location',e.target.value)},t.locations.map(x=>h('option',{key:x},x)))),
      h(Fld,{label:t.procStatus},h('select',{className:'inp',value:f.status,onChange:e=>s('status',e.target.value)},t.statuses.map(x=>h('option',{key:x},x)))),
      h(Fld,{label:t.editor},h('input',{className:'inp',style:{color:'#8b949e'},value:f.editor,readOnly:true})),
      h(Fld,{label:t.editDate},h('input',{className:'inp',style:{color:'#8b949e'},value:f.date,readOnly:true}))
    ),
    h('div',{style:{display:'flex',gap:10,justifyContent:t.dir==='rtl'?'flex-end':'flex-start',marginTop:6}},
      h('button',{className:'btn btn-ghost',onClick:onCancel},t.cancel),
      h('button',{className:'btn',style:{background:color,color:'#000'},onClick:()=>onSave(f)},t.save)
    )
  );
}

              h('div',{style:{color:'#8b949e',fontSize:12}},`S/N: ${p.serial}`+(p.niin?`  |  NIIN: ${p.niin}`:''))
            ),
            h(Badge,{color:sys.color},p.type)
          ),
          h('div',{style:{fontSize:13,marginBottom:10}},
            h('div',{style:{marginBottom:4}},h('span',{style:{color:'#8b949e'}},`${t.condition}: `),
              h('span',{style:{color:cc(p.condition,t.dir==='rtl'?'ar':'en'),fontWeight:700}},p.condition)),
            h('div',{style:{marginBottom:4}},h('span',{style:{color:'#8b949e'}},`${t.location}: `),p.location),
            h('div',{style:{color:sc(p.status),fontSize:12}},p.status)
          ),
          h('div',{style:{borderTop:'1px solid #21262d',paddingTop:9,display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',{style:{color:'#8b949e',fontSize:12}},`${p.editor} · ${p.date}`),
            h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn btn-ghost btn-sm',
                style:{background:'#25D36622',border:'1px solid #25D36644',color:'#25D366'},
                onClick:()=>{
                  const sysName=t.dir==='rtl'?sys.nameAr:sys.nameEn;
                  const msg=t.dir==='rtl'
                    ?`📋 *FOLLOWUP — معلومات القطعة*\n\n`+
                      `🔹 *المنظومة:* ${sysName}\n`+
                      `🔹 *رقم القطعة:* ${p.partNumber}\n`+
                      (p.partName?`🔹 *اسم القطعة:* ${p.partName}\n`:'')+
                      `🔹 *الرقم التسلسلي:* ${p.serial}\n`+
                      (p.niin?`🔹 *NIIN:* ${p.niin}\n`:'')+
                      `🔹 *الحالة:* ${p.condition}\n`+
                      `🔹 *النوع:* ${p.type}\n`+
                      `🔹 *المكان:* ${p.location}\n`+
                      `🔹 *الإجراء الحالي:* ${p.status}\n`+
                      `🔹 *آخر تعديل:* ${p.editor} — ${p.date}\n\n`+
                      `_تم الإرسال بواسطة: ${user.name}_`
                    :`📋 *FOLLOWUP — Part Info*\n\n`+
                      `🔹 *System:* ${sysName}\n`+
                      `🔹 *Part No:* ${p.partNumber}\n`+
                      (p.partName?`🔹 *Part Name:* ${p.partName}\n`:'')+
                      `🔹 *Serial:* ${p.serial}\n`+
                      (p.niin?`🔹 *NIIN:* ${p.niin}\n`:'')+
                      `🔹 *Condition:* ${p.condition}\n`+
                      `🔹 *Type:* ${p.type}\n`+

                  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
                }},'🟢 واتساب'),
              canEdit&&h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setEd(p);setShowF(true);}},'✏️'),
              canDel&&h('button',{className:'btn btn-danger btn-sm',onClick:()=>{onDel(p.id);toast('🗑','#f85149');}},'🗑')
            )
          )
        ))
    ),
    showF&&h(Modal,{title:ed?t.editPart:`${t.addPartTitle} — ${t.dir==='rtl'?sys.nameAr:sys.nameEn}`,
      onClose:()=>{setShowF(false);setEd(null);},dir:t.dir},
      h(PartForm,{init:ed,color:sys.color,onSave:save,onCancel:()=>{setShowF(false);setEd(null);},user,t})),
    showR&&h(ReportsModal,{parts:allParts,systems,user,onClose:()=>setShowR(false),t})
  );
}

// ── Admin Control Panel Modal ─────────────────────────────────────────────────
function AdminPanel({systems,parts,dynUsers,notes,rootPw,setSystems,setParts,setDynUsers,setNotes,onClose,t,lastSync,onSync}){
  const [restoreErr,setRestoreErr]=useState('');

  // ── Backup: download all data as JSON
  const doBackup=()=>{
    const data={version:2,date:new Date().toISOString(),systems,parts,users:dynUsers,notes};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`FOLLOWUP_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(a.href);
    toast('⬇️ '+t.backupBtn,'#3fb950');
  };

  // ── Restore: upload JSON and apply
  const doRestore=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.systems||!d.parts){setRestoreErr(t.restoreErr);return;}
        if(!window.confirm(t.clearConfirm))return;
        if(d.systems)setSystems(d.systems);
        if(d.parts)setParts(d.parts);
        if(d.users)setDynUsers(d.users);
        if(d.notes!==undefined)setNotes(d.notes);
        toast(t.restoreDone,'#3fb950');setRestoreErr('');onClose();
      }catch{setRestoreErr(t.restoreErr);}
    };
    reader.readAsText(file);
    e.target.value='';
  };

  // ── Clear all data
  const doClear=()=>{
    if(!window.confirm(t.clearConfirm))return;
    setSystems(SYSTEMS_INIT);setParts([]);setDynUsers([]);setNotes('');
    toast(t.clearDone,'#f85149');onClose();
  };

  const divider=h('div',{style:{height:1,background:'#21262d',margin:'16px 0'}});
  const sec=(icon,title,children)=>h('div',{style:{marginBottom:4}},
    h('div',{style:{color:'#8b949e',fontSize:11,letterSpacing:1,marginBottom:10,display:'flex',alignItems:'center',gap:6}},
      h('span',null,icon),h('span',null,title)),
    children
  );

  return h(Modal,{title:t.adminPanel,onClose,dir:t.dir},

    // ── Sync status
    sec('🌐',t.connected,
      h('div',{style:{background:'#161b22',border:'1px solid #30363d',borderRadius:10,padding:'12px 14px',
        display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',null,
          h('div',{style:{color:DB.isOnline()?'#3fb950':'#f85149',fontWeight:700,fontSize:13}},DB.isOnline()?t.connected:'🔴 Offline'),
          lastSync&&h('div',{style:{color:'#8b949e',fontSize:11,marginTop:3}},`${t.lastSync}: ${lastSync}`)
        ),
        h('button',{className:'btn btn-ghost',style:{padding:'7px 14px',fontSize:13},onClick:onSync},t.syncNow)
      )
    ),

    divider,

    // ── Backup & Restore
    sec('💾',t.backupBtn,
      h('div',{style:{display:'flex',gap:10}},
        h('button',{className:'btn btn-ghost',style:{flex:1,padding:'11px'},onClick:doBackup},t.backupBtn),
        h('label',{style:{flex:1}},
          h('div',{className:'btn btn-ghost',style:{padding:'11px',textAlign:'center',cursor:'pointer'}},t.restoreBtn),
          h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:doRestore})
        )
      ),
      restoreErr&&h('div',{style:{color:'#f85149',fontSize:12,marginTop:8}},restoreErr)
    ),

    divider,

    // ── Clear data
    sec('🗑️',t.clearBtn,
      h('button',{
        onClick:doClear,
        style:{width:'100%',background:'#f8514922',border:'1px solid #f8514966',
          color:'#f85149',borderRadius:10,padding:'12px',cursor:'pointer',
          fontWeight:800,fontSize:14,letterSpacing:1}
      },t.clearBtn)
    )
  );
}


function App(){
  const [user,setUser]=useState(null);
  const [lang,setLang]=useState('ar');
  const [systems,setSystems]=useState(SYSTEMS_INIT);
  const [parts,setParts]=useState([]);
  const [dynUsers,setDynUsers]=useState([]); // non-root users
  const [rootPw,setRootPw]=useState(ROOT.password); // persisted root password
  const [notes,setNotes]=useState('');
  const [active,setActive]=useState(null);
  const [showRep,setRep]=useState(false);
  const [showUsers,setShowUsers]=useState(false);
  const [showCp,setShowCp]=useState(false);
  const [showPanel,setShowPanel]=useState(false);
  const [lastSync,setLastSync]=useState('');
  const [showAddSys,setAddSys]=useState(false);
  const [newSys,setNewSys]=useState({nameAr:'',nameEn:'',color:'#a371f7',icon:'⚙️'});
  const [loading,setLoading]=useState(true);
  const [sv,setSv]=useState('');
  const [dp,setDp]=useState(null);
  const t=T[lang];

  // PWA install prompt
  useEffect(()=>{
    const fn=e=>{e.preventDefault();setDp(e);};
    window.addEventListener('beforeinstallprompt',fn);
    return()=>window.removeEventListener('beforeinstallprompt',fn);
  },[]);

  // ── Load + real-time sync from Firebase ──────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      // initial load
      const s=await DB.get('fu:systems');
      const p=await DB.get('fu:parts');
      const u=await DB.get('fu:users');
      const rp=await DB.get('fu:rootpw');
      const nt=await DB.get('fu:notes');
      if(s?.length>0)setSystems(s);
      if(p)setParts(p);
      if(u)setDynUsers(u);
      if(rp)setRootPw(rp);
      if(nt)setNotes(nt);
      setLoading(false);

      // real-time listeners — any change on any device updates all others instantly
      const unsubs=[
        DB.listen('fu:systems', v=>{if(v?.length>0)setSystems(v);}),
        DB.listen('fu:parts',   v=>{if(v)setParts(v);}),
        DB.listen('fu:users',   v=>{if(v)setDynUsers(v);}),
        DB.listen('fu:rootpw',  v=>{if(v)setRootPw(v);}),
        DB.listen('fu:notes',   v=>{if(v!==undefined)setNotes(v);}),
      ];
      return ()=>unsubs.forEach(fn=>fn());
    })();
  },[]);

  // Auto-save + track sync time
  const save=(k,v)=>{
    if(loading)return;
    setSv('saving');
    DB.set(k,v).then(()=>{
      setSv('saved');
      setLastSync(new Date().toLocaleTimeString());
      setTimeout(()=>setSv(''),1500);
    });
  };
  const syncNow=async()=>{
    setSv('saving');
    await Promise.all([
      DB.set('fu:systems',systems),DB.set('fu:parts',parts),
      DB.set('fu:users',dynUsers),DB.set('fu:rootpw',rootPw),DB.set('fu:notes',notes)
    ]);
    setSv('saved');setLastSync(new Date().toLocaleTimeString());
    setTimeout(()=>setSv(''),1500);
    toast(t.syncNow,'#3fb950');
  };
  useEffect(()=>save('fu:systems',systems),[systems,loading]);
  useEffect(()=>save('fu:parts',parts),[parts,loading]);
  useEffect(()=>save('fu:users',dynUsers),[dynUsers,loading]);
  useEffect(()=>save('fu:rootpw',rootPw),[rootPw,loading]);
  useEffect(()=>save('fu:notes',notes),[notes,loading]);

  // Build effective root with current password
  const effectiveRoot={...ROOT,password:rootPw};

  if(loading)return h('div',{className:'loader'},
    h('div',{className:'pulse',style:{width:54,height:54,borderRadius:14,background:'linear-gradient(135deg,#00c6ff,#f7971e)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}},'📋'),
    h('div',{style:{color:'#8b949e',fontSize:12,letterSpacing:2}},'FOLLOWUP')
  );

  if(!user)return h(LoginScreen,{onLogin:(a,l)=>{setUser(a);setLang(l);},users:dynUsers,dp,setDp,rootPw});

  const addPart=p=>setParts(ps=>[...ps,p]);
  const editPart=p=>setParts(ps=>ps.map(x=>x.id===p.id?p:x));
  const delPart=id=>setParts(ps=>ps.filter(x=>x.id!==id));
  const addSys=()=>{
    if(!newSys.nameAr||!newSys.nameEn)return;
    setSystems(s=>[...s,{...newSys,id:uid()}]);
    setNewSys({nameAr:'',nameEn:'',color:'#a371f7',icon:'⚙️'});setAddSys(false);toast(t.addBtn,'#3fb950');
  };

  const userSysIds=user.role==='ADMIN'?systems.map(s=>s.id):(Array.isArray(user.systemIds)?user.systemIds:user.systemId?[user.systemId]:[]);
  const visible=user.role==='ADMIN'?systems:systems.filter(s=>userSysIds.includes(s.id));

  if(active){
    const sys=systems.find(s=>s.id===active);
    return h(SysScreen,{sys,parts,allParts:parts,systems,
      onBack:()=>setActive(null),onAdd:addPart,onEdit:editPart,onDel:delPart,user,t});
  }

  const vp=parts.filter(p=>visible.find(s=>s.id===p.systemId));

  return h('div',{className:'page',dir:t.dir},
    // ── Top Bar
    h('div',{className:'topbar'},
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
        h('div',{style:{width:32,height:32,borderRadius:8,flexShrink:0,background:'linear-gradient(135deg,#00c6ff,#f7971e)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},'📋'),
        h('div',{style:{flex:1}},
          h('div',{style:{fontWeight:900,fontSize:16,letterSpacing:3}},'FOLLOWUP'),
          h('div',{style:{color:'#8b949e',fontSize:10,letterSpacing:2}},t.appSub)
        ),
        sv&&h('span',{style:{fontSize:11,color:sv==='saved'?'#3fb950':'#f7971e'}},sv==='saving'?'⏳':'✅'),
        h(LT,{lang,setLang}),
        h('div',{style:{display:'flex',alignItems:'center',gap:5,flexShrink:0}},
          h('span',{style:{background:ROLE_COLORS[user.role]+'22',color:ROLE_COLORS[user.role],
            border:`1px solid ${ROLE_COLORS[user.role]}55`,borderRadius:5,padding:'2px 7px',fontSize:10,fontWeight:700}},
            user.isRoot?'👑 Admin':t.roleLabels[user.role]),
          h('button',{onClick:()=>setShowCp(true),style:{background:'none',border:'none',
            color:'#e6edf3',fontSize:12,fontWeight:700,cursor:'pointer',padding:'2px 4px'},title:t.changePass},
            (user.isRoot?'Admin':user.name)+' 🔑'),
          h('button',{className:'btn btn-ghost',style:{padding:'4px 8px',fontSize:11},onClick:()=>setUser(null)},t.logout)
        )
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{className:'btn btn-ghost',style:{flex:1,padding:'9px'},onClick:()=>setRep(true)},t.reports),
        user.role==='ADMIN'&&h('button',{className:'btn btn-ghost',style:{flex:1,padding:'9px'},onClick:()=>setShowUsers(true)},t.manageUsers),
        user.role==='ADMIN'&&h('button',{className:'btn btn-ghost',style:{flex:1,padding:'9px'},onClick:()=>setShowPanel(true)},t.adminPanel),
        user.role==='ADMIN'&&h('button',{className:'btn btn-primary',style:{flex:1,padding:'9px'},onClick:()=>setAddSys(true)},t.newSystem)
      )
    ),

    h(InstallBanner,{t,dp,setDp}),

    // ── General Notes (Admin only)
    user.role==='ADMIN'&&h('div',{style:{padding:'14px 14px 0'}},
      h('div',{style:{
        background:'#0d1117',border:'1px solid #30363d',borderRadius:12,overflow:'hidden'
      }},
        h('div',{style:{
          background:'#161b22',padding:'10px 14px',
          display:'flex',alignItems:'center',gap:8,
          borderBottom:'1px solid #30363d'
        }},
          h('span',{style:{fontSize:16}},'📝'),
          h('span',{style:{color:'#e6edf3',fontWeight:700,fontSize:14}},t.notes.replace('📝 ',''))
        ),
        h('textarea',{
          value:notes,
          onChange:e=>setNotes(e.target.value),
          placeholder:t.notesPlaceholder,
          style:{
            width:'100%',minHeight:110,background:'#0d1117',
            border:'none',outline:'none',resize:'vertical',
            color:'#e6edf3',fontSize:14,padding:'12px 14px',
            fontFamily:'inherit',lineHeight:1.6,boxSizing:'border-box',
            direction:t.dir
          }
        })
      )
    ),

    // ── Systems
    h('div',{style:{padding:'0 14px 100px'}},
      h('div',{style:{color:'#8b949e',fontSize:12,letterSpacing:3,marginBottom:12}},t.availSystems),
      visible.map(sys=>{
        const cnt=parts.filter(p=>p.systemId===sys.id).length;
        return h('button',{key:sys.id,className:'sysb',
          style:{background:`linear-gradient(135deg,#0d1117 60%,${sys.color}18)`,
                 border:`1px solid ${sys.color}44`,marginBottom:14,
                 textAlign:t.dir==='rtl'?'right':'left',color:'#e6edf3'},
          onClick:()=>setActive(sys.id),
          onMouseEnter:e=>e.currentTarget.style.borderColor=sys.color,
          onMouseLeave:e=>e.currentTarget.style.borderColor=sys.color+'44'},
          h('div',{style:{fontSize:36,marginBottom:8}},sys.icon),
          h('div',{style:{fontSize:18,fontWeight:900,letterSpacing:3,color:sys.color}},sys.nameEn),
          h('div',{style:{color:'#8b949e',fontSize:13,margin:'4px 0 12px'}},sys.nameAr),
          h('span',{style:{background:sys.color+'22',borderRadius:8,padding:'5px 12px',
            color:sys.color,fontWeight:700,fontSize:13}},`${cnt} ${t.parts}`)
        );
      })
    ),

    // ── Modals
    showAddSys&&h(Modal,{title:t.addSystemTitle,onClose:()=>setAddSys(false),dir:t.dir},
      h(Fld,{label:t.nameAr},h('input',{className:'inp',value:newSys.nameAr,onChange:e=>setNewSys(n=>({...n,nameAr:e.target.value})),placeholder:'مثال: هوك'})),
      h(Fld,{label:t.nameEn},h('input',{className:'inp',value:newSys.nameEn,onChange:e=>setNewSys(n=>({...n,nameEn:e.target.value})),placeholder:'HAWK'})),
      h(Fld,{label:t.emoji},h('input',{className:'inp',value:newSys.icon,onChange:e=>setNewSys(n=>({...n,icon:e.target.value}))})),
      h(Fld,{label:t.color},h('input',{type:'color',className:'inp',style:{height:40,padding:4},value:newSys.color,onChange:e=>setNewSys(n=>({...n,color:e.target.value}))})),
      h('div',{style:{display:'flex',gap:10,justifyContent:t.dir==='rtl'?'flex-end':'flex-start'}},
        h('button',{className:'btn btn-ghost',onClick:()=>setAddSys(false)},t.cancel),
        h('button',{className:'btn btn-primary',onClick:addSys},t.addBtn)
      )
    ),
    showUsers&&h(UsersModal,{users:dynUsers,setUsers:setDynUsers,systems,onClose:()=>setShowUsers(false),t}),
    showCp&&h(ChangePwModal,{user,users:dynUsers,setUsers:setDynUsers,rootPw,setRootPw,onClose:()=>setShowCp(false),t}),
    showPanel&&h(AdminPanel,{systems,parts,dynUsers,notes,rootPw,setSystems,setParts,setDynUsers,setNotes,
      onClose:()=>setShowPanel(false),t,lastSync,onSync:syncNow}),
    showRep&&h(ReportsModal,{parts,systems,user,onClose:()=>setRep(false),t})
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
